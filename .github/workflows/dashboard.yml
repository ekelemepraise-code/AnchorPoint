name: Dashboard QA

on:
  push:
    branches: ["**"]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard.yml"
  pull_request:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard.yml"

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint dashboard
        run: npm run lint -w dashboard

      - name: Build dashboard
        run: npm run build -w dashboard

  browser-smoke:
    name: Cross-Browser Smoke (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: lint-and-build

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm exec --workspace dashboard -- playwright install --with-deps ${{ matrix.browser }}

      - name: Run browser smoke test
        run: npm run test:browser -w dashboard -- --project=${{ matrix.browser }}
